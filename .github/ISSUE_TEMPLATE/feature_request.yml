name: Feature Request
description: Suggest an idea or improvement for Condense
title: "[FEATURE]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ### Suggest an Enhancement
        Have an idea to make Condense faster, support more formats, or be more flexible? Let us know!

  - type: textarea
    id: problem_statement
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe.
      placeholder: "e.g. I am frustrated when trying to optimize..."
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you would like implemented.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions, workarounds, or libraries you have evaluated.
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Add any other context, performance benchmarks, or screenshots here.
    validations:
      required: false