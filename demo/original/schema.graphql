# =========================================================================
# COMPREHENSIVE GRAPHQL TELEMETRY QUERY PIPELINE
# Tests tokenization capability across deeply nested schema relationships.
# =========================================================================

query RetrieveCompleteEnterpriseUserPayloadMetrics(
  $targetUserIdentifierString: ID!
  $historicalDataLimitCount: Int!
) {
  enterpriseUserNodeContext(id: $targetUserIdentifierString) {
    systemAccountUUID
    profileDetailsSummary {
      givenLegalName
      familyLastName
      primaryElectronicMailAddress
    }
    operationalAnalyticsLogs(limit: $historicalDataLimitCount) {
      recordedEventTimestamp
      transactionLatencyMetrics {
        durationMilliseconds
        payloadSizeBytes
        httpStatusCodeResponse
      }
      securityContextFlags {
        isRequestIpBlacklisted
        originCountryCodeIso
      }
    }
  }
}